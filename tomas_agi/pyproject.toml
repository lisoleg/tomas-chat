# Pytest configuration for TOMAS/AGI project

[tool.pytest.ini_options]
# 测试目录
testpaths = ["tests", "sim"]

# 测试文件模式
python_files = ["test_*.py", "*_test.py"]

# 测试类
python_classes = ["Test*"]

# 测试函数
python_functions = ["test_*"]

# 覆盖率配置
# pip install pytest-cov
# addopts = "--cov=sim --cov-report=term-missing --cov-report=html"

# 自定义 markers
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "requires_api_key: marks tests that require DeepSeek API key",
    "integration: marks integration tests",
]

# 日志配置
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"

# 超时（需要 pip install pytest-timeout）
# timeout = 60
# timeout_method = "thread"

# 过滤警告
filterwarnings = [
    "error::RuntimeWarning",  # 将 RuntimeWarning 转为错误
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
]
